---
# template source: https://github.com/bretfisher/docker-build-workflow/blob/main/templates/call-docker-build.yaml
name: Docker Build

on:
  push:
    branches:
      - main
  pull_request:


jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write # needed to create and update comments in PRs

    
    steps:
      ##enable built to multiple platform by set up qemu:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
        
      ##set up buildkit cache 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      
      - name: login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}





        #build the image without push to dockerhub
      - name: Build and export to Docker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7.1.0
        with:
          push: false
          load: true # Export to Docker Engine rather than pushing to a registry
          tags: ${{ github.run_id }}
          #target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

          #before we push the image to docker hub we can check CVE. 
      - name: Run Trivy for all CVEs (non-blocking)
        uses: aquasecurity/trivy-action@264c9c5e188ea085e7377fd77abd17bfbd4e5926 #master
        with:
          image-ref: ${{ github.run_id }}
          exit-code: 0
          format: table 


      - name: Docker meta
        id: docker_meta #to access the output of metadata-action
        uses: docker/metadata-action@v3
        with:
          images: edengoldstein/httpenv_eden

          flavor: |
            latest=false #never generate latest.
          tags: | #set the rules to generate the tags and labels. 
            type=raw,value=04
            type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
          
        
      - name: Docker build
        uses: docker/build-push-action@v2
        with:
          push: ${{ github.event_name != 'pull_request' }} 
          tags: ${{ steps.docker_meta.outputs.tags }} #give a tags & labels that was generated automatically
          labels:  ${{ steps.docker_meta.outputs.labels }}
          #tags: edengoldstein/httpenv_eden:latest
          
          ##cache the image layer in githb cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

          #build the image in multiple platform
          platforms: linux/amd64,linux/arm64,linux/arm/v7

   

        # If PR, put image tags in the PR comments
        # from https://github.com/marketplace/actions/create-or-update-comment
      - name: Find comment for image tags
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e #v3.1.0
        if: github.event_name == 'pull_request'
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Docker image tag(s) pushed
      
        # If PR, put image tags in the PR comments
      - name: Create or update comment for image tags
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 #v4.0.0
        if: github.event_name == 'pull_request'
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Docker image tag(s) pushed:
            ```text
            ${{ steps.docker_meta.outputs.tags }}
            ```

            Labels added to images:
            ```text
            ${{ steps.docker_meta.outputs.labels }}
            ```
          edit-mode: replace
          
          

        
     

  
     



   
 
